# =============================================================================
# Project Configuration - h3-origin-destination-matrix
# =============================================================================
# This is the main configuration file for the project. Modify values here
# to control project behavior without changing source code.
#
# Secrets (credentials, API keys) should go in secrets.yml, NOT here.
# Copy secrets_template.yml to secrets.yml and fill in your values.
#
# Environment-specific settings live under the environments key.  Set the
# ENVIRONMENT constant in src/h3_od/config.py
# (or the PROJECT_ENV environment variable) to switch between dev / test / prod.
# =============================================================================

project:
  name: "h3-origin-destination-matrix"
  title: "H3 Origin-Destination Matrix"
  description: "Generate H3-based origin-destination cost matrices using network analysis."

# ---------------------------------------------------------------------------
# Environment-specific settings
# ---------------------------------------------------------------------------
environments:

  dev:
    logging:
      level: DEBUG
    h3:
      resolution: 8
    network:
      dataset: "D:\\data\\ba_data\\usa_2024\\Data\\StreetMap Premium Data\\northamerica.geodatabase\\main.Routing\\main.Routing_ND"
      travel_mode: "Rural Driving Distance"
      snap_distance: 0.5
      max_distance: 180.0
      origin_batch_size: 60
    data:
      aoi_polygon: "data/raw/raw.gdb/olympia_3_5_hour_drive_time"
      output_od_parquet: "data/processed/olympia_drive_3_5_od_matrix/parquet"

  olympia_walk:
    logging:
      level: DEBUG
    h3:
      resolution: 9
    network:
      dataset: "D:\\data\\ba_data\\usa_2024\\Data\\StreetMap Premium Data\\northamerica.geodatabase\\main.Routing\\main.Routing_ND"
      travel_mode: "Walking Distance"
      snap_distance: 0.3989203
      max_distance: 8.0
      origin_batch_size: 500
    data:
      aoi_polygon: "D:\\projects\\h3-origin-destination-matrix\\testing\\data\\olympia.gdb\\olympia_aoi"
      output_od_parquet: "D:\\projects\\h3-origin-destination-matrix\\testing\\data\\walk_parquet"

  olympia_drive:
    logging:
      level: DEBUG
    h3:
      resolution: 9
    network:
      dataset: "D:\\data\\ba_data\\usa_2024\\Data\\StreetMap Premium Data\\northamerica.geodatabase\\main.Routing\\main.Routing_ND"
      travel_mode: "Rural Driving Time"
      snap_distance: 0.3989203
      max_distance: 60.0
      origin_batch_size: 120
    data:
      aoi_polygon: "D:\\projects\\h3-origin-destination-matrix\\data\\raw\\raw.gdb\\scottsdale_1_hour_drive_time_buffered"
      h3_features: "D:\\projects\\arcgis-yelp\\data\\interim\\interim.gdb\\old_town_scottsdale_1_hour_h3_08_cnt"
      output_od_parquet: "D:\\projects\\h3-origin-destination-matrix\\data\\processed\\scottsdale_od_matrix_rural_drive_time_60_min\\parquet"

  rivco_walk:
    logging:
      level: DEBUG
    h3:
      resolution: 10
    network:
      dataset: "D:\\data\\ba_data\\usa_2024\\Data\\StreetMap Premium Data\\northamerica.geodatabase\\main.Routing\\main.Routing_ND"
      travel_mode: "Walking Distance"
      snap_distance: 0.3989203
      max_distance: 8.0
      origin_batch_size: 500
    data:
      aoi_polygon: "D:\\projects\\h3-origin-destination-matrix\\data\\external\\rivco.gdb\\county"
      output_od_parquet: "D:\\projects\\h3-origin-destination-matrix\\data\\processed\\rivco\\walk_parquet"

  rivco_drive:
    logging:
      level: DEBUG
    h3:
      resolution: 10
    network:
      dataset: "D:\\data\\ba_data\\usa_2024\\Data\\StreetMap Premium Data\\northamerica.geodatabase\\main.Routing\\main.Routing_ND"
      travel_mode: "Rural Driving Time"
      snap_distance: 0.3989203
      max_distance: 60.0
      origin_batch_size: 120
    data:
      aoi_polygon: "D:\\projects\\h3-origin-destination-matrix\\data\\external\\rivco.gdb\\county"
      output_od_parquet: "D:\\projects\\h3-origin-destination-matrix\\data\\processed\\rivco\\rural_drive_parquet"
